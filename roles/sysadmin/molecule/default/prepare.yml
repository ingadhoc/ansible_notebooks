---
- name: Prepare
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Prepare | Ensure systemd is available
      ansible.builtin.command: systemctl --version
      changed_when: false
      register: sysadmin_systemd_check
      failed_when: sysadmin_systemd_check.rc != 0

    - name: Prepare | Create test user for SUDO_USER simulation
      ansible.builtin.user:
        name: testuser
        state: present
        shell: /bin/bash
        create_home: true

    - name: Prepare | Set SUDO_USER environment for testing  # noqa: var-naming[no-role-prefix]
      ansible.builtin.set_fact:
        ansible_env:
          SUDO_USER: testuser

    - name: Prepare | Ensure /tmp has correct permissions
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: "1777"
