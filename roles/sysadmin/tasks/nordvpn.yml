# roles/sysadmin/tasks/nordvpn.yml
---
- name: SysAdmin | Instalar y configurar NordVPN
  tags: nordvpn
  become: true
  when: not (sysadmin_skip_nordvpn | default(false))
  block:
    - name: NordVPN | Descargar la clave GPG del repositorio de NordVPN
      ansible.builtin.get_url:
        url: https://repo.nordvpn.com/gpg/nordvpn_public.asc
        dest: /tmp/nordvpn_public.asc
        mode: "0644"
      changed_when: false

    - name: NordVPN | Convertir y mover la clave GPG
      ansible.builtin.shell: gpg --dearmor < /tmp/nordvpn_public.asc > {{ sysadmin_nordvpn_gpg_path }}
      args:
        creates: "{{ sysadmin_nordvpn_gpg_path }}"
        executable: /bin/bash
      changed_when: false

    - name: NordVPN | Limpiar archivo temporal de clave GPG
      ansible.builtin.file:
        path: /tmp/nordvpn_public.asc
        state: absent
      changed_when: false

    # El paquete nordvpn autogestiona su propio archivo de repo vía postinst.
    # Configuramos el repo solo como bootstrap cuando aún no está instalado;
    # luego lo maneja el paquete. Así evitamos pisarnos con su postinst
    # (idempotencia), igual que con Chrome y VS Code.
    - name: NordVPN | Verificar si NordVPN ya está instalado
      ansible.builtin.stat:
        path: /usr/bin/nordvpn
      register: sysadmin_nordvpn_installed

    - name: NordVPN | Eliminar el repositorio legacy en formato .list (migración a deb822)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/nordvpn.list
        state: absent
      when: not sysadmin_nordvpn_installed.stat.exists

    - name: NordVPN | Añadir el repositorio de APT de NordVPN (formato deb822 .sources)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/nordvpn.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://repo.nordvpn.com/deb/nordvpn/debian
          Suites: stable
          Components: main
          Signed-By: {{ sysadmin_nordvpn_gpg_path }}
      register: sysadmin_nordvpn_repo
      when: not sysadmin_nordvpn_installed.stat.exists

    - name: NordVPN | Instalar el paquete de NordVPN
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: "{{ 0 if (sysadmin_nordvpn_repo.changed | default(false)) else (apt_cache_valid_time | default(3600)) }}"
        name: "{{ sysadmin_nordvpn_package }}"
        state: present

    - name: NordVPN | Añadir el usuario principal al grupo 'nordvpn'
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        groups: nordvpn
        append: true
