---
# Las variables del rol se cargan automáticamente desde vars/main.yml
- name: Include
  block:
    - name: SysAdmin - Instalación de paquetes y dependencias varias
      ansible.builtin.import_tasks: packages.yml
    - name: SysAdmin - Pulumi
      ansible.builtin.import_tasks: pulumi.yml
    - name: SysAdmin - KVM/QEMU
      ansible.builtin.import_tasks: kvm.yml
    - name: SysAdmin - Helm
      ansible.builtin.import_tasks: helm.yml
    - name: SysAdmin - NordVPN
      ansible.builtin.import_tasks: nordvpn.yml
    - name: SysAdmin - AWS CLI
      ansible.builtin.import_tasks: awscli.yml
    - name: SysAdmin - Theme
      ansible.builtin.import_tasks: theme_desktop.yml
    - name: SysAdmin - Fixes
      ansible.builtin.import_tasks: fixes.yml
