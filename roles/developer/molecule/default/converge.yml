---
- name: Converge
  hosts: all
  become: true

  vars:
    skip_gnome_tasks: true
    developer_manage_vscode_extensions: false
    developer_manage_vscode_defaults: false
    developer_skip_docker: false
    developer_skip_docker_service: true
    developer_skip_remote_dev: true

  pre_tasks:
    - name: Converge | Simulate sudo invocation (SUDO_USER) for the role  # noqa: var-naming[no-role-prefix]
      ansible.builtin.set_fact:
        ansible_facts: "{{ ansible_facts | combine({'env': {'SUDO_USER': 'testuser'}}, recursive=True) }}"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 600
      changed_when: false

    - name: Install base dependencies for testing
      ansible.builtin.apt:
        name:
          - sudo
          - gnupg
          - lsb-release
          - dbus
          - ca-certificates
          - curl
        state: present

  roles:
    - role: developer
