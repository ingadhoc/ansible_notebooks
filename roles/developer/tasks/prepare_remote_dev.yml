---
- name: Odoo Dev | Preparar entorno de desarrollo local de Odoo
  tags: remote_dev
  become: false
  when: not (developer_skip_remote_dev | default(false))
  block:
    - name: Odoo Dev | Refrescar conexión para aplicar cambios de grupo (ej. docker)
      ansible.builtin.meta: reset_connection

    - name: Odoo Dev | Crear directorio base 'odoo'
      ansible.builtin.file:
        path: "{{ developer_odoo_base_path }}"
        state: directory
        mode: "0755"

    # git con update: true ya hace clone-or-update idempotente; no hace falta
    # un stat previo (los registros que había no se usaban en ningún when).
    - name: Odoo Dev | Clonar/actualizar repositorio docker-compose-context a 'ctx'
      ansible.builtin.git:
        repo: "{{ developer_odoo_ctx_repo }}"
        dest: "{{ developer_odoo_base_path }}/ctx"
        version: main
        accept_hostkey: true
        update: true
        force: true

    - name: Odoo Dev | Clonar/actualizar repositorio docker-compose-odoo a '16'
      ansible.builtin.git:
        repo: "{{ developer_odoo_main_repo }}"
        dest: "{{ developer_odoo_base_path }}/16"
        version: main
        accept_hostkey: true
        update: true
        force: true

    - name: Odoo Dev | Clonar/actualizar repositorio docker-compose-odoo a '18'
      ansible.builtin.git:
        repo: "{{ developer_odoo_main_repo }}"
        dest: "{{ developer_odoo_base_path }}/18"
        version: main
        accept_hostkey: true
        update: true
        force: true

    - name: Odoo Dev | Clonar/actualizar repositorio docker-compose-odoo a '19'
      ansible.builtin.git:
        repo: "{{ developer_odoo_main_repo }}"
        dest: "{{ developer_odoo_base_path }}/19"
        version: main
        accept_hostkey: true
        update: true
        force: true
