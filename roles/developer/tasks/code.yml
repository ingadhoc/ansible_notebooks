---
- name: Code | Añadir el repositorio oficial y el paquete de VS Code
  tags: code
  become: true
  block:
    - name: Code | Crear directorio para claves GPG
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Code | Verificar si la clave GPG ya está instalada
      ansible.builtin.stat:
        path: "{{ developer_external_repos.vscode.keyring_path }}"
      register: developer_vscode_gpg_key

    - name: Code | Descargar la clave GPG de Microsoft
      ansible.builtin.get_url:
        url: "{{ developer_external_repos.vscode.gpg_url }}"
        dest: /tmp/microsoft.asc
        mode: "0644"
      when: not developer_vscode_gpg_key.stat.exists

    - name: Code | Convertir y guardar la clave GPG
      ansible.builtin.command: >-
        gpg --dearmor -o {{ developer_external_repos.vscode.keyring_path }} /tmp/microsoft.asc
      when: not developer_vscode_gpg_key.stat.exists
      changed_when: false

    - name: Code | Limpiar archivo temporal
      ansible.builtin.file:
        path: /tmp/microsoft.asc
        state: absent
      when: not developer_vscode_gpg_key.stat.exists

    # El paquete 'code' de Microsoft autogestiona su propio archivo de repo
    # (postinst reescribe vscode.sources). Configuramos el repo solo como
    # bootstrap cuando VS Code aún no está instalado; luego lo maneja el
    # paquete. Así evitamos pisarnos con su postinst (idempotencia).
    - name: Code | Verificar si VS Code ya está instalado
      ansible.builtin.stat:
        path: /usr/bin/code
      register: developer_vscode_installed

    - name: Code | Eliminar el repositorio legacy en formato .list (migración a deb822)
      ansible.builtin.file:
        path: "/etc/apt/sources.list.d/{{ developer_external_repos.vscode.filename }}.list"
        state: absent
      when: not developer_vscode_installed.stat.exists

    - name: Code | Añadir el repositorio de VS Code (formato deb822 .sources)
      ansible.builtin.copy:
        dest: "/etc/apt/sources.list.d/{{ developer_external_repos.vscode.filename }}.sources"
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: {{ developer_external_repos.vscode.uris }}
          Suites: {{ developer_external_repos.vscode.suites }}
          Components: {{ developer_external_repos.vscode.components }}
          Architectures: {{ developer_external_repos.vscode.architectures | replace(',', ' ') }}
          Signed-By: {{ developer_external_repos.vscode.signed_by }}
      register: developer_vscode_repo
      when: not developer_vscode_installed.stat.exists

- name: Code | Instalar el paquete 'code'
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ 0 if (developer_vscode_repo.changed | default(false)) else (funcional_apt_cache_valid_time | default(3600)) }}"
    name: code
    state: present

- name: Code | Gestionar extensiones de forma idempotente
  tags: code
  become: true
  become_user: "{{ remote_regular_user }}"
  when: developer_manage_vscode_extensions | default(true)
  block:
    - name: Code | Obtener lista de extensiones ya instaladas
      ansible.builtin.command: "code --list-extensions"
      environment:
        DBUS_SESSION_BUS_ADDRESS: "unix:path=/run/user/{{ remote_regular_user_uid }}/bus"
      register: developer_installed_extensions
      changed_when: false
      failed_when: false

    - name: Code | Instalar solo las extensiones que falten
      ansible.builtin.command: "code --install-extension {{ item }}"
      loop: "{{ developer_vscode_extension_list }}"
      when: developer_installed_extensions.rc == 0 and item not in (developer_installed_extensions.stdout_lines | default([]))
      changed_when: true

- name: Code | Gestionar la configuración del usuario
  tags: code
  become: true
  become_user: "{{ remote_regular_user }}"
  when: developer_manage_vscode_defaults | default(true)
  block:
    - name: Code | Establecer como editor por defecto para ciertos tipos de archivo
      ansible.builtin.command: "xdg-mime default code.desktop application/x-shellscript text/plain text/markdown application/x-yaml text/x-python"
      changed_when: false

    - name: Code | Crear directorios de configuración en el home del usuario
      ansible.builtin.file:
        path: "/home/{{ remote_regular_user }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - ".config/Code/User"
        - ".config/pycodestyle"
        - ".config/flake8"

    - name: Code | Copiar archivos de configuración
      ansible.builtin.copy:
        src: "{{ item.src }}"
        dest: "/home/{{ remote_regular_user }}/{{ item.dest }}"
        owner: "{{ remote_regular_user }}"
        group: "{{ remote_regular_user }}"
        mode: "0644"
      loop: "{{ developer_vscode_config_files }}"
