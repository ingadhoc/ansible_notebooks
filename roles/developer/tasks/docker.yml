---
- name: Docker | Instalar y configurar Docker Engine
  tags: docker
  become: true
  when: not (developer_skip_docker | default(false))
  block:
    - name: Docker | Instalar paquetes de prerrequisitos
      ansible.builtin.apt:
        name: "{{ developer_docker_prerequisites }}"
        state: present

    - name: Docker | Asegurar que el directorio de keyrings de APT existe
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Docker | Verificar si la clave GPG ya está instalada
      ansible.builtin.stat:
        path: "{{ developer_external_repos.docker.keyring_path }}"
      register: developer_docker_gpg_key

    - name: Docker | Añadir la clave GPG oficial de Docker
      ansible.builtin.get_url:
        url: "{{ developer_external_repos.docker.gpg_url }}"
        dest: /tmp/docker.gpg
        mode: "0644"
      when: not developer_docker_gpg_key.stat.exists

    - name: Docker | Convertir la clave GPG al formato requerido
      ansible.builtin.command: >-
        gpg --dearmor -o {{ developer_external_repos.docker.keyring_path }} /tmp/docker.gpg
      # Solo corre si la clave no existía (gateado por el stat de arriba): cuando
      # corre, crea el keyring, así que el cambio es real.
      when: not developer_docker_gpg_key.stat.exists
      changed_when: true

    - name: Docker | Limpiar archivo temporal de clave GPG
      ansible.builtin.file:
        path: /tmp/docker.gpg
        state: absent
      when: not developer_docker_gpg_key.stat.exists

    - name: Docker | Eliminar el repositorio legacy en formato .list (migración a deb822)
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    - name: Docker | Añadir el repositorio de Docker (formato deb822 .sources)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: {{ developer_external_repos.docker.repo_url }}/{{ ansible_facts['distribution'] | lower }}
          Suites: {{ ansible_facts['distribution_release'] }}
          Components: stable
          Architectures: {{ 'amd64' if ansible_facts['architecture'] == 'x86_64' else 'arm64' }}
          Signed-By: {{ developer_external_repos.docker.keyring_path }}
      register: developer_docker_repo

    - name: Docker | Instalar Docker Engine y plugins
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: "{{ 0 if (developer_docker_repo.changed | default(false)) else (funcional_apt_cache_valid_time | default(3600)) }}"
        name: "{{ developer_docker_packages }}"
        state: present

    - name: Docker | Asegurar que el servicio Docker esté activo y habilitado
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true
      when: not (developer_skip_docker_service | default(false))
      failed_when: false

    - name: Docker | Asegurar que el grupo 'docker' existe
      ansible.builtin.group:
        name: docker
        state: present

    - name: Docker | Añadir el usuario al grupo 'docker' para evitar usar sudo
      ansible.builtin.user:
        name: "{{ remote_regular_user }}"
        groups: docker
        append: true
