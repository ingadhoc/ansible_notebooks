---
# Los vars propios del rol se cargan automáticamente desde vars/main.yml.
# Además, las tareas reutilizadas (kubectl/gcloud) dependen de vars de funcional
# (funcional_external_repos, funcional_kubectl_prerequisites): como se importan vía
# import_tasks con ruta relativa (no import_role), funcional/vars/main.yml NO se
# autocarga, así que lo incluimos explícitamente.
- name: Include vars from funcional (funcional_external_repos, etc.)
  ansible.builtin.include_vars: "{{ role_path | dirname }}/funcional/vars/main.yml"
  tags: always

# NOTA: se reutilizan los archivos de tareas de funcional/sysadmin vía
# import_tasks con ruta relativa (no import_role). Es deliberado: import_role
# dispararía las dependencias de meta/main.yml (sysadmin -> developer -> funcional)
# en cascada, instalando roles enteros que deploy no necesita.
- name: Include
  block:
    - name: Kubectl
      ansible.builtin.import_tasks: ../roles/funcional/tasks/kubectl.yml
    - name: GCloud
      ansible.builtin.import_tasks: ../roles/funcional/tasks/gcloud.yml
    - name: Pulumi
      ansible.builtin.import_tasks: ../roles/sysadmin/tasks/pulumi.yml
      vars:
        sysadmin_pulumi_version: "{{ deploy_pulumi_version }}"
        sysadmin_pulumi_install_root: "{{ deploy_pulumi_install_root }}"
    - name: Project
      ansible.builtin.import_tasks: project.yml
