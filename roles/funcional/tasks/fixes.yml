---
- name: Arreglos | Aplicar aplicaciones favoritas del dock (todas las distros)
  tags: funcional_fixes, gnome
  become: true
  become_user: "{{ remote_regular_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/favorite-apps"
    value: "{{ gnome_functional_favorite_apps }}"
    state: present
  when:
    - ansible_facts['distribution'] in ['Ubuntu', 'Debian']
    - not (skip_gnome_tasks | default(false))

- name: Arreglos | Configurar comportamiento del dock (dash-to-dock, solo Ubuntu)
  tags: funcional_fixes, gnome
  become: true
  become_user: "{{ remote_regular_user }}"
  community.general.dconf:
    key: "/org/gnome/shell/extensions/dash-to-dock/click-action"
    value: "'minimize'"
    state: present
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - not (skip_gnome_tasks | default(false))

- name: Arreglos | Forzar Xorg y reinstalar (Ubuntu 22.04+ y Debian 13+)
  tags: xorg_fixes
  become: true
  when: >
    (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] is version('22.04', '>=')) or
    (ansible_facts['distribution'] == 'Debian' and ansible_facts['distribution_version'] | int >= 13)
  block:
    - name: Arreglos | Reinstalar Xorg (controlado por variable)
      ansible.builtin.apt:
        name: xorg
        state: present
        force: true
      when: force_xorg_reinstall | bool

    - name: Arreglos | Verificar si gdm3 está instalado
      ansible.builtin.stat:
        path: /etc/gdm3
      register: gdm3_dir

    - name: Arreglos | Asegurar que existe el directorio /etc/gdm3
      ansible.builtin.file:
        path: /etc/gdm3
        state: directory
        mode: '0755'
      when: not gdm3_dir.stat.exists

    - name: Arreglos | Configurar GDM3 para deshabilitar Wayland (WaylandEnable=false)
      community.general.ini_file:
        path: /etc/gdm3/custom.conf
        section: daemon
        option: WaylandEnable
        value: "false"
        mode: '0644'
        create: true
      register: xorg_fix_wayland

    - name: Arreglos | Configurar GDM3 para forzar sesión Xorg (DefaultSession)
      community.general.ini_file:
        path: /etc/gdm3/custom.conf
        section: daemon
        option: DefaultSession
        value: "gnome-xorg.desktop"
        mode: '0644'
        create: true
      register: xorg_fix_session

    - name: Arreglos | Informar que se requiere reinicio para aplicar cambio a Xorg
      ansible.builtin.debug:
        msg: "GDM3 configurado para Xorg en /etc/gdm3/custom.conf. Reiniciá el equipo para que tome efecto."
      when: xorg_fix_wayland.changed or xorg_fix_session.changed
