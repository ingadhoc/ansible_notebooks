---
- name: Prepare
  hosts: all
  gather_facts: true
  become: true

  tasks:
    - name: Prepare | Ensure systemd is running
      ansible.builtin.command: systemctl --version
      changed_when: false
      register: funcional_systemd_check
      failed_when: funcional_systemd_check.rc != 0

    - name: Prepare | Create test user for SUDO_USER simulation
      ansible.builtin.user:
        name: testuser
        state: present
        create_home: true
        shell: /bin/bash

    - name: Prepare | Ensure /tmp has correct permissions
      ansible.builtin.file:
        path: /tmp
        state: directory
        mode: "1777"
