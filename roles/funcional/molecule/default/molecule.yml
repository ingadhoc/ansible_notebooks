---
dependency:
  name: galaxy
  options:
    requirements-file: ../../../../collections/requirements.yml
    force: false

driver:
  name: docker

platforms:
  - name: debian13-funcional
    image: geerlingguy/docker-debian13-ansible:latest
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: timer, profile_tasks
      stdout_callback: default
      result_format: yaml
      roles_path: ../../../../roles
      # Replica el ansible.cfg del repo: testea el escenario post-deprecación
      # (facts solo vía ansible_facts['...'], sin auto-inyección top-level).
      inject_facts_as_vars: false
  inventory:
    host_vars:
      debian13-funcional:
        ansible_user: root
  playbooks:
    converge: converge.yml
    verify: verify.yml
  env:
    ANSIBLE_ROLES_PATH: ../../../../roles

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
