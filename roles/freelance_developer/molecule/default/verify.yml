---
- name: Verify
  hosts: all
  become: true
  tasks:
    - name: Verify | Required CLIs exist
      ansible.builtin.command: bash -lc "command -v {{ item }}"
      loop:
        - git
        - python3
        - gh
        - kubectl
        - gcloud
        - docker
      register: freelance_developer_cli_checks
      changed_when: false
      failed_when: freelance_developer_cli_checks.rc != 0
