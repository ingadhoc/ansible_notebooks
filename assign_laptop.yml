---
- name: Reasignar laptop a un nuevo usuario
  hosts: all
  become: true

  vars:
    old_user: adhoc

  tasks:
    - name: Terminar la sesión del usuario anterior
      ansible.builtin.command: loginctl terminate-user {{ old_user }}
      changed_when: true
      failed_when: false

    - name: Esperar a que los procesos terminen
      ansible.builtin.pause:
        seconds: 3

    - name: Matar procesos remanentes del usuario
      ansible.builtin.command: pkill -9 -u {{ old_user }}
      changed_when: true
      failed_when: false

    - name: Esperar a que los procesos terminados salgan
      ansible.builtin.pause:
        seconds: 2

    - name: Renombrar el usuario y mover su home
      ansible.builtin.command: >
        usermod -l {{ new_user }}
                -d /home/{{ new_user }}
                -m
                -c "{{ full_name }}"
                {{ old_user }}
      changed_when: true

    - name: Renombrar el grupo primario
      ansible.builtin.command: groupmod -n {{ new_user }} {{ old_user }}
      changed_when: true

    - name: Asignar el grupo primario al nuevo usuario
      ansible.builtin.command: usermod -g {{ new_user }} {{ new_user }}
      changed_when: true

    - name: Renombrar el archivo sudoers si existe
      ansible.builtin.command: mv /etc/sudoers.d/{{ old_user }} /etc/sudoers.d/{{ new_user }}
      args:
        creates: /etc/sudoers.d/{{ new_user }}
      changed_when: true
      failed_when: false

    - name: Actualizar el contenido del sudoers
      ansible.builtin.replace:
        path: /etc/sudoers.d/{{ new_user }}
        regexp: "{{ old_user }}"
        replace: "{{ new_user }}"
      failed_when: false

    - name: Actualizar los bookmarks de GTK
      ansible.builtin.replace:
        path: /home/{{ new_user }}/.config/gtk-3.0/bookmarks
        regexp: "/home/{{ old_user }}"
        replace: "/home/{{ new_user }}"
      failed_when: false

    - name: Configurar el wallpaper (modo claro)
      ansible.builtin.command: >
        sudo -u {{ new_user }} dbus-run-session
        dconf write /org/gnome/desktop/background/picture-uri
        "'file:///home/{{ new_user }}/.wallpaper.png'"
      changed_when: true

    - name: Configurar el wallpaper (modo oscuro)
      ansible.builtin.command: >
        sudo -u {{ new_user }} dbus-run-session
        dconf write /org/gnome/desktop/background/picture-uri-dark
        "'file:///home/{{ new_user }}/.wallpaper.png'"
      changed_when: true

    - name: Configurar git para el nuevo usuario
      become: true
      become_user: "{{ new_user }}"
      community.general.git_config:
        name: user.name
        value: "{{ full_name }}"
        scope: global
      failed_when: false

    - name: Actualizar el hostname en /etc/hosts
      ansible.builtin.replace:
        path: /etc/hosts
        regexp: "adhoc-adhoc-nb"
        replace: "{{ hostname }}"

    - name: Establecer el hostname
      ansible.builtin.hostname:
        name: "{{ hostname }}"
