---
name: Molecule CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changed roles
    runs-on: ubuntu-latest
    outputs:
      funcional: ${{ steps.filter.outputs.funcional }}
      developer: ${{ steps.filter.outputs.developer }}
      sysadmin: ${{ steps.filter.outputs.sysadmin }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter paths por rol (respeta el grafo de dependencias)
        # funcional es base; developer depende de funcional; sysadmin de developer.
        # Por eso cada filtro incluye los paths de los roles de los que depende:
        # tocar funcional re-testea los 3, developer re-testea developer+sysadmin.
        # 'shared' = archivos que afectan a todos (play, deps, el propio workflow).
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared: &shared
              - 'local.yml'
              - 'collections/requirements.yml'
              - 'requirements-dev.txt'
              - '.github/workflows/molecule.yml'
            funcional:
              - *shared
              - 'roles/funcional/**'
            developer:
              - *shared
              - 'roles/funcional/**'
              - 'roles/developer/**'
            sysadmin:
              - *shared
              - 'roles/funcional/**'
              - 'roles/developer/**'
              - 'roles/sysadmin/**'

  lint:
    name: Lint Ansible code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles('collections/requirements.yml') }}
          restore-keys: |
            ansible-collections-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Install Ansible collections
        run: |
          ansible-galaxy install -r collections/requirements.yml

      - name: Run yamllint
        run: |
          echo "## 🔍 YAML Lint Results" >> $GITHUB_STEP_SUMMARY
          if yamllint . 2>&1 | tee yamllint.log; then
            echo "✅ No YAML linting issues found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ YAML linting warnings found (non-blocking)" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            head -20 yamllint.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Run ansible-lint
        run: |
          echo "## 🔍 Ansible Lint Results" >> $GITHUB_STEP_SUMMARY
          if ansible-lint local.yml 2>&1 | tee ansible-lint.log; then
            echo "✅ No Ansible linting issues found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Ansible linting warnings found (non-blocking)" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            head -20 ansible-lint.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
        continue-on-error: true

      - name: Syntax check
        run: |
          echo "## ✅ Syntax Check" >> $GITHUB_STEP_SUMMARY
          if ansible-playbook local.yml --syntax-check; then
            echo "✅ Playbook syntax is valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Playbook syntax check failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  test-funcional:
    name: Test funcional role
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.funcional == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles('collections/requirements.yml') }}
          restore-keys: |
            ansible-collections-${{ runner.os }}-

      - name: Install Ansible collections
        run: |
          ansible-galaxy install -r collections/requirements.yml

      - name: Run Molecule tests
        run: |
          set -o pipefail
          echo "## 🧪 Testing funcional role on debian13" >> $GITHUB_STEP_SUMMARY
          cd roles/funcional
          log_file="../../molecule-funcional-debian13.log"
          if molecule test 2>&1 | tee "$log_file"; then
            echo "✅ Tests passed for funcional on debian13" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed for funcional on debian13" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failure excerpt" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -B 5 -A 30 -E "FAILED!|fatal:|ERROR" "$log_file" | head -120 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-logs-funcional-debian13
          path: |
            molecule-funcional-debian13.log
            roles/funcional/molecule/default/*.log
            ~/.cache/molecule/

  test-developer:
    name: Test developer role
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.developer == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles('collections/requirements.yml') }}
          restore-keys: |
            ansible-collections-${{ runner.os }}-

      - name: Install Ansible collections
        run: |
          ansible-galaxy install -r collections/requirements.yml

      - name: Run Molecule tests
        run: |
          set -o pipefail
          echo "## 🧪 Testing developer role on debian13" >> $GITHUB_STEP_SUMMARY
          cd roles/developer
          log_file="../../molecule-developer-debian13.log"
          if molecule test 2>&1 | tee "$log_file"; then
            echo "✅ Tests passed for developer on debian13" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed for developer on debian13" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failure excerpt" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -B 5 -A 30 -E "FAILED!|fatal:|ERROR" "$log_file" | head -120 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-logs-developer-debian13
          path: |
            molecule-developer-debian13.log
            roles/developer/molecule/default/*.log
            ~/.cache/molecule/

  test-sysadmin:
    name: Test sysadmin role
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.sysadmin == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Cache Ansible collections
        uses: actions/cache@v4
        with:
          path: ~/.ansible/collections
          key: ansible-collections-${{ runner.os }}-${{ hashFiles('collections/requirements.yml') }}
          restore-keys: |
            ansible-collections-${{ runner.os }}-

      - name: Install Ansible collections
        run: |
          ansible-galaxy install -r collections/requirements.yml

      - name: Run Molecule tests
        run: |
          set -o pipefail
          echo "## 🧪 Testing sysadmin role on debian13" >> $GITHUB_STEP_SUMMARY
          cd roles/sysadmin
          log_file="../../molecule-sysadmin-debian13.log"
          if molecule test 2>&1 | tee "$log_file"; then
            echo "✅ Tests passed for sysadmin on debian13" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed for sysadmin on debian13" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Failure excerpt" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            grep -B 5 -A 30 -E "FAILED!|fatal:|ERROR" "$log_file" | head -120 >> $GITHUB_STEP_SUMMARY || true
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: molecule-logs-sysadmin-debian13
          path: |
            molecule-sysadmin-debian13.log
            roles/sysadmin/molecule/default/*.log
            ~/.cache/molecule/

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-funcional, test-developer, test-sysadmin]
    if: always()

    steps:
      - name: Generate test summary
        run: |
          echo "# 🧪 Ansible Notebooks - Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Role Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Role | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          # Una fila por rol. 'skipped' = no hubo cambios que afecten ese rol.
          row() {
            case "$2" in
              success) echo "| $1 | ✅ Passed |" >> $GITHUB_STEP_SUMMARY ;;
              skipped) echo "| $1 | ⏭️ Skipped (sin cambios) |" >> $GITHUB_STEP_SUMMARY ;;
              *)       echo "| $1 | ❌ Failed |" >> $GITHUB_STEP_SUMMARY ;;
            esac
          }
          row funcional "${{ needs.test-funcional.result }}"
          row developer "${{ needs.test-developer.result }}"
          row sysadmin "${{ needs.test-sysadmin.result }}"

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Platforms Tested" >> $GITHUB_STEP_SUMMARY
          echo "- 🐧 Debian 13 (Trixie)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall status: 'skipped' (sin cambios para ese rol) cuenta como OK;
          # solo 'failure'/'cancelled' marcan el resumen como fallido.
          ok() { [ "$1" == "success" ] || [ "$1" == "skipped" ]; }
          if ok "${{ needs.test-funcional.result }}" && \
             ok "${{ needs.test-developer.result }}" && \
             ok "${{ needs.test-sysadmin.result }}"; then
            echo "## ✅ Overall Status: SUCCESS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All tests passed successfully! 🎉" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Overall Status: FAILED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Some tests failed. Check individual job results for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
